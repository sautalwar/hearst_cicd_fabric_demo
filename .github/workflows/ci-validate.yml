name: CI - Validate & Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - 'fabric/**'
      - 'tests/**'
      - 'infra/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate Terraform & Fabric Items
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.6'

      - name: Terraform Format Check
        working-directory: ./infra
        run: terraform fmt -check -recursive

      - name: Terraform Init (validation mode)
        working-directory: ./infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./infra
        run: terraform validate

      # Optional: terraform plan (requires credentials; enable if you have OIDC or SP auth)
      # - name: Terraform Plan
      #   working-directory: ./infra
      #   env:
      #     ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      #     ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      #     ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      #   run: terraform plan -no-color

  lint-notebooks:
    name: Lint Notebooks & Python
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install nbqa flake8 black

      - name: Lint notebooks with flake8
        run: |
          if [ -d "fabric" ]; then
            nbqa flake8 fabric/ --extend-ignore=E501,W503
          fi
          if [ -d "tests" ]; then
            nbqa flake8 tests/ --extend-ignore=E501,W503
          fi

      - name: Check notebook formatting with black
        run: |
          if [ -d "fabric" ]; then
            nbqa black fabric/ --check
          fi
          if [ -d "tests" ]; then
            nbqa black tests/ --check
          fi

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GL_VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks scan
        run: ./gitleaks detect --source . --no-git --config .gitleaks.toml --redact --no-banner --verbose
        # Exit code 1 (fails the job) if any secret is detected; 0 if clean

  bpa-semantic-model:
    name: Semantic Model BPA (Best Practice Analyzer)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tabular Editor 2 CLI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/TabularEditor/TabularEditor/releases/download/2.17.3/TabularEditor.Portable.zip" -OutFile TE2.zip
          Expand-Archive -Path TE2.zip -DestinationPath te2 -Force

      - name: Run BPA on semantic model TMDL (advisory)
        shell: pwsh
        continue-on-error: true   # BPA is an advisory best-practice check — violations don't block the PR
        run: |
          # Tabular Editor 2 is a native Windows tool; run it on a Windows runner against the TMDL model.
          ./te2/TabularEditor.exe "fabric/sm_hearst_audience.SemanticModel" -BPA "tests/semantic_model/bpa_rules.json" -V
        # Exit code: 0 = all rules passed, nonzero = violations found (reported, non-blocking)
